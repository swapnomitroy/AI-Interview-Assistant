<!DOCTYPE html>
<html>

<head>

    <title>Interview Round</title>

    <style>

        body{
            background-color:#111827;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        .question-box{
            width:60%;
            margin:auto;
            background:#1f2937;
            padding:30px;
            border-radius:15px;
        }

        h1{
            color:#60a5fa;
        }

        textarea{
            width:80%;
            height:120px;
            margin-top:20px;
            border-radius:10px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

    </style>

</head>

<body>

    <div class="question-box">

        <h1>Interview Question</h1>

        <h2>What is Artificial Intelligence?</h2>

        <textarea placeholder="Type your answer here"></textarea>

        <br>

        <button>Submit Answer</button>

    </div>

</body>

</html>
